<div class="w-full">
  @if (label()) {
    <div class="flex justify-between mb-1 mt-4">
      <span class="text-base font-medium text-gray-700">{{ label() }}</span>
      <span class="text-sm font-medium text-gray-700">{{ clampedValue() }}%</span>
    </div>
  }

  <div class="w-full bg-gray-200 rounded-full h-2.5 my-2 overflow-hidden">
    <div
      class="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out"
      [style.width.%]="clampedValue()"
    ></div>
  </div>
</div>
