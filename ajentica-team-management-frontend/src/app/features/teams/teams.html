<div class="head-container">
  <h1 class="">{{ pageName }}</h1>
  <app-add-button [routerLink]="['/teams/add']" label="Team"></app-add-button>
</div>
<section>
  <div class="card-container">
    @for (team of teams(); track team.id) {
      <app-card>
        <div class="card-header">
          <h3>{{ team.name }}</h3>

          <div class="flex gap-2 h-9">
            <button [routerLink]="['/teams/edit', team.id]" class="btn-icon">
              <svg lucideSquarePen [size]="20" [strokeWidth]="1"></svg>
            </button>
            <button (click)="openModal(team)" class="btn-icon">
              <svg lucideTrash [size]="20" [strokeWidth]="1"></svg>
            </button>
          </div>
        </div>
        <p>
          Team lead: <button class="name-btn">{{ team.lead.name }}</button>
        </p>
        <p class="my-4 flex flex-wrap gap-2">Members: {{ team.members.length }}</p>
        <p class="my-4">Projects: {{ team.projects.length }}</p>
        <app-view-details-button [routerLink]="['view-details', team.id]"></app-view-details-button>
      </app-card>
    }
  </div>
</section>

<app-confirm-modal
  [isOpen]="isModalOpen()"
  [itemName]="selectedName()"
  (confirm)="handleConfirm()"
  (cancel)="closeModal()"
></app-confirm-modal>
