<div class="head-container">
  <h1 class="">{{ pageName }}</h1>
  <app-add-button [routerLink]="['add']" label="Team"></app-add-button>
</div>
<section>
  <div class="card-container">
    <app-card>
      <div class="card-header">
        <h3>Team Name</h3>

        <div class="flex gap-2">
          <button [routerLink]="['edit']" class="btn-icon">
            <svg lucideSquarePen [size]="20" [strokeWidth]="1"></svg>
          </button>
          <button (click)="openModal('Team Alpha')" class="btn-icon">
            <svg lucideTrash [size]="20" [strokeWidth]="1"></svg>
          </button>
        </div>
      </div>
      <p>Team lead: John Doe</p>
      <p>Members: Alice, Bob, Charlie</p>
      <p>Projects: Project Apollo, Website Redesign</p>
      <app-view-details-button [routerLink]="['view-details']"></app-view-details-button>
    </app-card>
  </div>
</section>

<app-confirm-modal
  [isOpen]="isModalOpen()"
  [itemName]="selectedName()"
  (confirm)="handleConfirm()"
  (cancel)="closeModal()"
></app-confirm-modal>
